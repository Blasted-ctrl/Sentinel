name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · type · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      DATABASE_URL: postgresql+psycopg://sentinel:sentinel@localhost:5432/sentinel
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies
        run: uv sync --extra dev --extra torch --extra tf --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (type-check)
        run: uv run mypy

      - name: Pytest (incl. PostGIS integration)
        run: uv run pytest --cov=sentinel --cov-report=term-missing
